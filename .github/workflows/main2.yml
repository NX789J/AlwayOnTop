name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Remove UTF-8 BOM from C# files
        run: |-
          find . -name '*.cs' -exec sed -i '1s/^\xEF\xBB\xBF//' {} +

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build
        run: dotnet build
