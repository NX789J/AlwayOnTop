name: Build Windows UWP App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Lấy source code
      uses: actions/checkout@v4

    - name: Cài đặt MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Khôi phục gói NuGet
      # Vẫn cần restore các gói phụ trợ
      run: msbuild AlwaysOnTop.sln /t:Restore /p:Configuration=Release /p:Platform="x64"

    - name: Build ứng dụng UWP
      # Sử dụng Action chuyên biệt cho UWP
      uses: microsoft/setup-msbuild@v1.0.2 # Lưu ý: Đây là phiên bản cũ hơn nhưng ổn định cho UWP
      # Hoặc tốt nhất là dùng lệnh trực tiếp nhưng cấu hình chuẩn cho UWP
      
    - name: Tiến hành Build (Cách chuẩn cho UWP)
      run: |
        msbuild AlwaysOnTop.sln `
          /p:Configuration=Release `
          /p:Platform="x64" `
          /p:UapAppxPackageBuildMode=StoreUpload `
          /p:AppxBundle=Always `
          /p:PackageCertificateKeyFile="" `
          /p:PackageCertificateThumbprint="" `
          /p:AppxPackageSigningEnabled=false
          
    - name: Upload file cài đặt
      uses: actions/upload-artifact@v4
      with:
        name: UngDungCuaToi
        # Đường dẫn mới cho gói AppxBundle
        path: ./**/AppPackages/**/*.* ```

# **Những thay đổi mang tính quyết định trong file này:**
# 1. **Ép vô hiệu hóa chữ ký số hoàn toàn:** Bằng cách thêm `/p:PackageCertificateKeyFile=""` và `/p:PackageCertificateThumbprint=""`, chúng ta ép hệ thống quên đi các chứng chỉ bảo mật (thứ thường gây kẹt khi build UWP trên máy chủ).
# 2. **Đổi chế độ Build:** `/p:UapAppxPackageBuildMode=StoreUpload` và `/p:AppxBundle=Always` là các lệnh chuẩn của Microsoft để xuất ra một gói `.appxbundle` hoàn chỉnh, thay vì cố gắng xuất ra file `.exe` (UWP không thể xuất file `.exe` độc lập).
# 3. **Đổi đường dẫn tải về:** File xuất ra của UWP luôn nằm trong thư mục `AppPackages`, chứ không nằm trong `bin/Release`.

# Hãy commit lại đoạn mã này. Nếu vẫn gặp lỗi "missing namespace", điều đó có nghĩa là phiên bản `windows-latest` của GitHub Actions hiện tại đang bị lỗi bộ Windows SDK 19041. Lúc đó, chúng ta sẽ phải đổi `runs-on: windows-latest` thành `runs-on: windows-2022` hoặc `windows-2019` để tìm môi trường ổn định hơn. Cố lên, chúng ta sắp chạm đích rồi!
